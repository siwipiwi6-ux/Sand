<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Our Love Story 🌷</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- Passcode Screen -->
    <div id="passcodeScreen" class="screen active">
        <div class="passcode-container">
            <h1>A little surprise awaits you...</h1>
            <div class="passcode-box">
                <div class="hearts-decoration">❤️ 💕 ❤️</div>
                <input 
                    type="password" 
                    id="passcodeInput" 
                    class="passcode-input" 
                    placeholder="Enter passcode"
                    maxlength="6"
                >
                <div class="input-indicator">
                    <span id="indicator0" class="dot"></span>
                    <span id="indicator1" class="dot"></span>
                    <span id="indicator2" class="dot"></span>
                    <span id="indicator3" class="dot"></span>
                    <span id="indicator4" class="dot"></span>
                    <span id="indicator5" class="dot"></span>
                </div>
                <p id="passcodeError" class="error-message"></p>
            </div>
            <div class="tulips-bottom">🌷 🌷 🌷</div>
        </div>
    </div>

    <!-- Envelope Screen -->
    <div id="envelopeScreen" class="screen">
        <div class="envelope-container">
            <div id="envelope" class="envelope">
                <div class="envelope-flap"></div>
                <div class="envelope-body"></div>
            </div>
            <p class="envelope-hint">Tap the envelope 💌</p>
        </div>
    </div>

    <!-- Tulip Petals Animation Screen -->
    <div id="petalsScreen" class="screen">
        <div id="petalsContainer" class="petals-container"></div>
        <div class="loading-text">✨ Just a moment... ✨</div>
    </div>

    <!-- Sketchbook Screen -->
    <div id="sketchbookScreen" class="screen">
        <div class="sketchbook-container">
            <div class="book-spine"></div>
            <div class="book">
                <div id="leftPage" class="page left-page">
                    <div class="page-content"></div>
                </div>
                <div id="rightPage" class="page right-page">
                    <div class="page-content"></div>
                </div>
            </div>
            <div class="navigation-dots">
                <button id="prevBtn" class="nav-btn prev-btn">← Previous</button>
                <span id="pageIndicator" class="page-indicator"></span>
                <button id="nextBtn" class="nav-btn next-btn">Next →</button>
            </div>
        </div>
    </div>

    <!-- Audio player (hidden) -->
    <audio id="backgroundMusic" loop>
        <source src="music.mp3" type="audio/mpeg">
    </audio>

    <script src="script.js"></script>
</body>
</html>
